<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choir Management - Verify Email</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 90%;
            max-width: 450px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        p {
            color: #666;
            margin-bottom: 30px;
            text-align: center;
        }

        .code-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .code-box .label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .code-box .code {
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 15px;
            font-family: monospace;
            background: rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 10px;
            display: inline-block;
        }

        .info-text {
            background: #e8f4fd;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #0369a1;
            text-align: center;
            border-left: 4px solid #667eea;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 24px;
            text-align: center;
            letter-spacing: 10px;
            font-weight: bold;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-bottom: 10px;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button.secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            display: none;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📧 Verify Your Email</h1>
        <p>Enter the 6-digit verification code sent to your email</p>
        
        <div class="code-box" id="codeBox">
            <div class="label">Your Verification Code</div>
            <div class="code" id="displayCode">••••••</div>
        </div>
        
        <div class="info-text" id="infoText">
            Check the code above or in your registration success message
        </div>
        
        <div class="form-group">
            <label>Enter Verification Code</label>
            <input type="text" id="code" placeholder="------" maxlength="6" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
        </div>
        
        <button onclick="verify()">Verify Email</button>
        <button class="secondary" onclick="resendCode()">Resend Code</button>
        <button onclick="goToLogin()">Back to Login</button>
        
        <div id="message" class="message"></div>
    </div>

    <script>
        // Show the verification code prominently
        window.onload = function() {
            const email = localStorage.getItem('pendingVerification');
            if (email) {
                const users = JSON.parse(localStorage.getItem('users') || '[]');
                const user = users.find(u => u.email === email);
                if (user && user.verificationCode) {
                    document.getElementById('displayCode').textContent = user.verificationCode;
                    document.getElementById('infoText').innerHTML = `✓ Code sent to ${email}<br>Enter the code above to verify your account`;
                }
            } else {
                document.getElementById('codeBox').style.display = 'none';
                document.getElementById('infoText').innerHTML = 'No pending verification found. Please register first.';
            }
        };

        function verify() {
            const code = document.getElementById('code').value.trim();
            const email = localStorage.getItem('pendingVerification');
            const messageDiv = document.getElementById('message');

            if (!code || code.length !== 6) {
                showMessage('Please enter the 6-digit verification code', 'error');
                return;
            }

            let users = JSON.parse(localStorage.getItem('users') || '[]');
            const userIndex = users.findIndex(u => u.email === email);

            if (userIndex === -1) {
                showMessage('User not found. Please register again.', 'error');
                return;
            }

            if (users[userIndex].verificationCode === code) {
                users[userIndex].verified = true;
                delete users[userIndex].verificationCode;
                
                localStorage.setItem('users', JSON.stringify(users));
                
                showMessage('✅ Email verified successfully! Redirecting to login...', 'success');
                
                localStorage.removeItem('pendingVerification');
                
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } else {
                showMessage('❌ Invalid verification code. Please try again.', 'error');
            }
        }

        function resendCode() {
            const email = localStorage.getItem('pendingVerification');
            let users = JSON.parse(localStorage.getItem('users') || '[]');
            const userIndex = users.findIndex(u => u.email === email);

            if (userIndex !== -1) {
                const newCode = Math.floor(100000 + Math.random() * 900000).toString();
                users[userIndex].verificationCode = newCode;
                localStorage.setItem('users', JSON.stringify(users));
                
                document.getElementById('displayCode').textContent = newCode;
                showMessage(`✅ New code sent: ${newCode}`, 'success');
            } else {
                showMessage('User not found', 'error');
            }
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
        }

        function goToLogin() {
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
