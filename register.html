<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choir Management - Register</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 90%;
            max-width: 450px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        .password-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .password-input-wrapper input {
            padding-right: 45px;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: #667eea;
            padding: 0;
            margin: 0;
            width: auto;
        }

        .toggle-password:hover {
            transform: none;
            box-shadow: none;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button.secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .text-center {
            text-align: center;
            margin-top: 15px;
        }

        .link {
            color: #667eea;
            text-decoration: none;
            cursor: pointer;
            font-weight: 500;
        }

        .link:hover {
            text-decoration: underline;
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            display: none;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .password-strength {
            margin-top: 5px;
            font-size: 12px;
            min-height: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Create Account</h1>
        
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="fullName" placeholder="Enter your full name">
        </div>
        
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="Enter your email">
        </div>
        
        <div class="form-group">
            <label>Password</label>
            <div class="password-input-wrapper">
                <input type="password" id="password" placeholder="Create a password (min. 6 characters)" onkeyup="checkPasswordStrength()">
                <button type="button" class="toggle-password" onclick="togglePassword('password', this)">👁️</button>
            </div>
            <div id="passwordStrength" class="password-strength"></div>
        </div>
        
        <div class="form-group">
            <label>Confirm Password</label>
            <div class="password-input-wrapper">
                <input type="password" id="confirmPassword" placeholder="Confirm your password" onkeyup="checkPasswordMatch()">
                <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword', this)">👁️</button>
            </div>
            <div id="passwordMatch" class="password-strength"></div>
        </div>
        
        <button onclick="register()">Register</button>
        <button class="secondary" onclick="goToLogin()">Back to Login</button>
        
        <div id="message" class="message"></div>
    </div>

    <script>
        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                button.textContent = '🔒';
            } else {
                input.type = 'password';
                button.textContent = '👁️';
            }
        }

        function checkPasswordStrength() {
            const password = document.getElementById('password').value;
            const strengthDiv = document.getElementById('passwordStrength');
            
            if (password.length === 0) {
                strengthDiv.textContent = '';
                return;
            }
            
            let strength = 'Weak';
            let color = '#f5576c';
            
            if (password.length >= 8) {
                strength = 'Good';
                color = '#667eea';
            }
            if (password.length >= 10) {
                strength = 'Strong';
                color = '#4CAF50';
            }
            
            strengthDiv.textContent = `Password strength: ${strength}`;
            strengthDiv.style.color = color;
        }

        function checkPasswordMatch() {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const matchDiv = document.getElementById('passwordMatch');
            
            if (confirm.length === 0) {
                matchDiv.textContent = '';
                return;
            }
            
            if (password === confirm) {
                matchDiv.textContent = '✓ Passwords match';
                matchDiv.style.color = '#4CAF50';
            } else {
                matchDiv.textContent = '✗ Passwords do not match';
                matchDiv.style.color = '#f5576c';
            }
        }

        function register() {
            // Get form values
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageDiv = document.getElementById('message');

            // Clear previous messages
            messageDiv.style.display = 'none';
            messageDiv.className = 'message';

            // Validation
            if (!fullName || !email || !password || !confirmPassword) {
                showMessage('Please fill in all fields', 'error');
                return;
            }

            if (fullName.length < 2) {
                showMessage('Please enter a valid name', 'error');
                return;
            }

            // Email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showMessage('Please enter a valid email address', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('Password must be at least 6 characters long', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }

            // Get existing users from localStorage
            let users = [];
            try {
                const storedUsers = localStorage.getItem('users');
                if (storedUsers) {
                    users = JSON.parse(storedUsers);
                }
            } catch (e) {
                console.error('Error parsing users:', e);
                users = [];
            }

            // Check if email already exists
            const existingUser = users.find(u => u.email === email);
            if (existingUser) {
                showMessage('This email is already registered. Please login.', 'error');
                return;
            }

            // Generate verification code
            const verificationCode = Math.floor(100000 + Math.random() * 900000).toString();

            // Create new user object with profile fields
            const newUser = {
                id: Date.now(),
                fullName: fullName,
                email: email,
                password: password,
                verified: false,
                verificationCode: verificationCode,
                createdAt: new Date().toISOString(),
                role: 'member',
                profilePicture: '', // Will be set later
                bio: '',
                phone: '',
                voicePart: ''
            };

            // Add to users array
            users.push(newUser);

            // Save to localStorage
            try {
                localStorage.setItem('users', JSON.stringify(users));
                
                // Store email for verification
                localStorage.setItem('pendingVerification', email);
                
                // Show success message with verification code
                showMessage(`Registration successful! Your verification code is: ${verificationCode}\n\nYou will be redirected to verification page.`, 'success');
                
                // Clear form
                document.getElementById('fullName').value = '';
                document.getElementById('email').value = '';
                document.getElementById('password').value = '';
                document.getElementById('confirmPassword').value = '';
                document.getElementById('passwordStrength').textContent = '';
                document.getElementById('passwordMatch').textContent = '';
                
                // Redirect to verification page after 3 seconds
                setTimeout(() => {
                    window.location.href = 'verify.html';
                }, 3000);
                
            } catch (e) {
                console.error('Error saving user:', e);
                showMessage('Error creating account. Please try again.', 'error');
            }
        }

        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
        }

        function goToLogin() {
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
